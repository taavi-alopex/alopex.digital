name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 65.108.88.183
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/alopex-site
            git pull origin main
            docker compose up -d --build --force-recreate alopex-site
